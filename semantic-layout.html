<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Layout Example</title>
</head>
<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    <a href="#">Home</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
</nav>

<main>

    <section>
        <h2>About Me</h2>
        <p>This section contains information about me.</p>
    </section>

    <article>
        <h2>Blog Post</h2>
        <p>This is my sample blog post using semantic tags.</p>
    </article>

    <aside>
        <h3>Extra Information</h3>
        <p>This is additional related content.</p>
    </aside>

</main>

<footer>
    <p> 2026 Alina | All Rights Reserved</p>
</footer>

</body>
</html>
